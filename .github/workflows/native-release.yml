name: Native Release Checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/native-release.yml
      - apps/expo-showcase/**
      - package-lock.json
      - package.json
      - packages/**
      - scripts/run-expo-native-release-check.mjs

jobs:
  android-release:
    name: Android Release Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build packages
        run: npm run build

      - name: Android release build
        run: npm run native:release:android

  ios-release:
    name: iOS Release Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build packages
        run: npm run build

      - name: iOS release build
        run: npm run native:release:ios
