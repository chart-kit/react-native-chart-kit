name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish
        required: true
        default: next
        type: choice
        options:
          - next
          - beta
          - latest

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Verify release branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "next" ]; then
            echo "This workflow publishes the rebuild package and must be run from the next branch."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: E2E
        run: npm run test:e2e

      - name: Docs
        run: npm run docs:build

      - name: Verify package is unpublished
        id: package
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          NPM_TAG="${{ inputs.npm_tag }}"
          TAG_NAME="v${PACKAGE_VERSION}"

          echo "name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "npm_tag=${NPM_TAG}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"

          if [ "${NPM_TAG}" = "latest" ] && [[ "${PACKAGE_VERSION}" == *-* ]]; then
            echo "Refusing to publish prerelease version ${PACKAGE_VERSION} with npm dist-tag latest"
            exit 1
          fi

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "${TAG_NAME} already exists"
            exit 1
          fi

      - name: Publish
        run: npm publish --access public --provenance --tag "${NPM_TAG}"
        env:
          NPM_TAG: ${{ steps.package.outputs.npm_tag }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          TAG_NAME: ${{ steps.package.outputs.tag }}
        run: |
          awk "/^## v${PACKAGE_VERSION}$/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "Published ${PACKAGE_NAME}@${PACKAGE_VERSION} to npm." > release-notes.md
          fi

          if [[ "${PACKAGE_VERSION}" == *-* ]]; then
            gh release create "${TAG_NAME}" \
              --target "${GITHUB_SHA}" \
              --title "${TAG_NAME}" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "${TAG_NAME}" \
              --target "${GITHUB_SHA}" \
              --title "${TAG_NAME}" \
              --notes-file release-notes.md
          fi
